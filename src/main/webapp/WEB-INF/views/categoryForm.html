<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input[type=text] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .error { color: #e74c3c; font-size: 0.9em; margin-top: 4px; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #357abd; }
        .btn-back { background: #95a5a6; margin-left: 8px; }
        footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid #ddd; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>카테고리 등록</h1>

    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <div class="form-group">
            <label for="name">카테고리 이름</label>
            <input type="text" id="name" th:field="*{name}" placeholder="카테고리 이름"/>
            <span class="error" th:errors="*{name}"></span>
        </div>
        <button type="submit" class="btn">등록</button>
        <a th:href="@{/categories}" class="btn btn-back">취소</a>
    </form>

    <footer>
        실습 수행 일시: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></span>
        | 학번: 2191234 | 성명: 이현종
    </footer>

</body>
</html>
